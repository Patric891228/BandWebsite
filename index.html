<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>樂團歌單</title>
  <link rel="preconnect" href="https://script.google.com" />
  <link rel="preconnect" href="https://img.youtube.com" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#F9F5F0] px-4 py-10 text-lg">
  <div class="max-w-5xl mx-auto text-center">
    <div class="hero-panel mb-10 rounded-[28px] px-6 py-6 md:px-10 md:py-8">
      <h1 class="inline-flex items-center justify-center gap-2 text-4xl font-bold text-gray-800 md:text-5xl">
        🎵 樂團演出歌單
      </h1>
      <p id="subtitle" class="subtitle-text mt-3 text-base">點選一場演出，查看當天的歌曲與影片。</p>
    </div>

    <div id="eventPage">
      <div id="eventList" class="grid grid-cols-1 gap-6 justify-center sm:grid-cols-2 md:grid-cols-3">
      </div>
    </div>

    <div id="songPage" class="hidden fade-in-up">
      <button id="backButton" type="button" class="back-button mb-6 mx-auto transition-transform duration-300 hover:scale-105">
        返回演出列表
      </button>

      <div class="song-table-shell overflow-x-auto rounded-[24px]">
        <table class="song-table mx-auto min-w-full bg-white text-lg">
          <thead>
            <tr>
              <th class="px-4 py-4 text-center text-xl">歌曲</th>
              <th class="px-4 py-4 text-center text-xl sm:text-left">YouTube</th>
            </tr>
          </thead>
          <tbody id="songList" class="fade-in-up-delayed divide-y divide-gray-200">
          </tbody>
        </table>
      </div>
    </div>

    <div id="loading" class="loading-copy mt-6 text-center text-base">資料載入中...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
